# SensOS chrony configuration for field devices.
# Prefer public pool servers when connectivity exists, keep RTC in sync when present,
# and tolerate long offline periods without trying to serve time to others.

pool pool.ntp.org iburst

# Step the clock quickly on early startup if the offset is large.
makestep 1.0 3

# Record drift so the clock behaves reasonably while offline.
driftfile /var/lib/chrony/chrony.drift

# Persist measurements and RTC tracking across reboots.
dumpdir /var/lib/chrony
ntsdumpdir /var/lib/chrony
rtcsync

# Log basic tracking information for troubleshooting.
logdir /var/log/chrony
log tracking measurements statistics

# Act only as a client.
port 0
cmdport 0

# Ignore sources that look implausible.
maxupdateskew 100.0
